<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薛之谦iOS私人源</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Open Sans","Helvetica Neue",sans-serif}
body{background:#121212;color:#f0f0f0;padding:20px;max-width:420px;margin:0 auto}
.header{text-align:center;padding:30px 0}
.title{font-size:24px;color:#007aff}
.sub{color:#999;margin-top:6px;font-size:14px}
.repo{background:#1c1c1e;border-radius:16px;padding:20px;margin:20px 0}
.repo-url{color:#007aff;font-weight:600;word-break:break-all}
.copy-btn{background:#007aff;color:#fff;border:none;border-radius:12px;padding:12px 16px;margin-top:12px;width:100%;font-weight:600;font-size:15px}
.package{background:#1c1c1e;border-radius:16px;padding:20px;margin-bottom:12px}
.pkg-name{font-size:17px;color:#fff}
.pkg-desc{color:#999;font-size:14px;margin-top:6px}
</style>
</head>
<body>
<div class="header">
<div class="title">薛之谦iOS私人源</div>
<div class="sub">Cydia / Sileo / Zebra 通用源</div>
</div>

<div class="repo">
<div style="font-size:13px;color:#999">源地址</div>
<div class="repo-url" id="url">https://cdn.jsdelivr.net/gh/Xzq123456789-xzq/ios-erno/repo/</div>
<button class="copy-btn" onclick="copy()">复制源地址</button>
</div>

<div class="package">
<div class="pkg-name">电子斗蛐蛐 v1.0</div>
<div class="pkg-desc">iOS越狱小游戏，可安装到桌面</div>
</div>

<script>
function copy(){
let u=document.getElementById('url').innerText
navigator.clipboard.writeText(u).then(()=>{
alert('已复制源地址，去 Cydia 添加即可')
})
}
</script>
</body>
</html>
